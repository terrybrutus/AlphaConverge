name: Verify
on:
  pull_request:
  push:
    branches: [main]
jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @caffeine/template-frontend test
      - run: pnpm --filter @caffeine/template-frontend typecheck
      - run: pnpm --filter @caffeine/template-frontend exec biome lint src
      - run: pnpm --filter @caffeine/template-frontend build
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --global ic-mops
      - run: mops install
      - run: mops check
